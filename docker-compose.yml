version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/colony-local-dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "colony-local-dev", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  sidecar:
    build: .
    ports:
      - "7777:7777"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: colony-local-dev
      COLONY_API_KEY: ${COLONY_API_KEY:-dev-key-local}
      LOG_LEVEL: debug
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - sidecar-data:/app/data

volumes:
  neo4j-data:
  sidecar-data:
