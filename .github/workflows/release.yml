name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  # --- Python sidecar → PyPI ---
  pypi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: sidecar/dist/
          # Re-running a release (e.g. to retry a failed npm leg) must not
          # fail just because this version is already on PyPI.
          skip-existing: true

  # --- TypeScript plugin → npm ---
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      # Blocking again as of v0.20.x: the @aevonix/colonyai package exists
      # and publishes are gated on a valid NPM_TOKEN. (A bad/expired token
      # makes `npm publish` return a 404 on PUT — npm's auth-failure
      # signature — which previously hid behind continue-on-error.)
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Docker image → GHCR ---
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./sidecar
          push: true
          tags: |
            ghcr.io/aevonix/colony:latest
            ghcr.io/aevonix/colony:${{ github.ref_name }}
