name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  # --- Python sidecar → PyPI ---
  pypi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: sidecar/dist/
          # Re-running a release (e.g. to recover a failed later job) must not
          # fail just because this version is already on PyPI.
          skip-existing: true

  # --- Docker image → GHCR ---
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: ./sidecar
          push: true
          tags: |
            ghcr.io/aevonix/colony:latest
            ghcr.io/aevonix/colony:${{ github.ref_name }}

  # --- GitHub Release ← tag + CHANGELOG ---
  # Runs only after PyPI and GHCR publish, so the Release never points at
  # artifacts that failed to ship.
  github-release:
    needs: [pypi, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release from tag + CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # Extract this version's section from CHANGELOG.md.
          # Headings are "## <tag> — <title>"; capture until the next "## ".
          awk -v tag="$tag" '
            /^## / { if ($2 == tag) { f=1; next } else if (f) { f=0 } }
            f { print }
          ' CHANGELOG.md > notes.md
          sed -i -e '/./,$!d' notes.md            # drop leading blank lines
          [ -s notes.md ] || echo "Release $tag" > notes.md
          title="$(grep -m1 "^## ${tag} " CHANGELOG.md | sed 's/^## //')"
          [ -n "$title" ] || title="$tag"
          # Idempotent: edit an existing Release on re-run, otherwise create it.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file notes.md
          else
            gh release create "$tag" --title "$title" --notes-file notes.md --verify-tag
          fi
