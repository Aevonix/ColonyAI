# Example Hermes webhook configuration for Colony autonomy pipeline
# Place this under platforms.webhook.extra.routes in ~/.hermes/config.yaml
#
# Philosophy (v0.16.0):
# - Colony is the AGENT'S brain. Initiatives are the agent's own work
#   queue — not notifications to forward to the owner.
# - The agent DECIDES: execute / snooze / dismiss / communicate / ask
#   for approval. Messaging the owner is one option among five, never
#   the default.
# - Webhook responses go to watcher (log) by default. The agent decides
#   which channel to communicate to the owner via send_message.

---
colony-initiatives:
  secret: INSECURE_NO_AUTH  # For local testing only
  prompt: |
    Colony {payload.type} received at {payload.occurred_at} (now: {now}):

    {if payload.type == "initiative"}
    This is YOUR work item — Colony is your brain surfacing it; the owner
    has not seen it and does not need to unless YOU decide they should.

    Type: {payload.payload.initiative_type}
    Title: {payload.payload.title}
    Subject (entity_id): {payload.payload.entity_id}
    Description: {payload.payload.description}
    Priority: {payload.payload.priority}
    Context: {payload.payload.context}
    Context durability: {payload.payload.context_durability}

    FRESHNESS CHECK (do this first):
    - If context_durability is "volatile", check context.context_captured_at
      against now. If it looks stale, refresh before acting:
      POST {colony_url}/v1/host/initiatives/{payload.payload.id}/context/refresh
      (If the refresh response comes back cancelled with reason
      "condition_cleared", the situation resolved itself — stop here.)

    DECIDE — choose exactly one:
    1. EXECUTE — do the work now with your own toolsets. Read-only work
       needs no approval. Anything that mutates state or sends something
       outside the system goes through the approval flow instead (5).
    2. SNOOZE — not now. POST /v1/host/initiatives/{payload.payload.id}/respond
       with action "snoozed".
    3. DISMISS — not worth doing. POST .../respond with action "dismissed"
       and a short reason (Colony learns from this).
    4. COMMUNICATE — the owner genuinely needs to know or decide something.
       Send AT MOST ONE concise message via send_message to
       "{payload.delivery_context.log_channel}". No progress updates.
    5. REQUEST APPROVAL — for mutating/outbound actions, the job will be
       BLOCKED awaiting the owner; tell the owner once, concisely.

    Your FULL reasoning and tool output go to LOGS only.
    {endif}

    {if payload.type == "alert"}
    Alert Type: {payload.payload.alert_type}
    Severity: {payload.payload.severity}
    Last Seen: {payload.payload.last_seen_at}
    Suggested Action: {payload.payload.suggested_action}

    DELIVERY RULES (alert):
    - Route this alert to the LOG CHANNEL ONLY.
    - NEVER send a DM to the owner for alerts regardless of severity.
    - Use `send_message` with target "{payload.delivery_context.log_channel}".
    {endif}

    TEMPORAL AWARENESS:
    - The current time is {now}. Always prefer this over any timestamps
      from Colony data.
    - If data appears stale, say so — do not fabricate a narrative to
      make it seem current.

  deliver: log
  rate_limit: 5

# Agent jobs (v0.16.0) — claimed from Colony's task queue by
# colony-queue-worker.py. This includes observation syncs: Colony asking
# YOU to be its eyes. You observe through your own connections (github,
# terminal, web); Colony never calls external APIs itself.
colony-jobs:
  secret: INSECURE_NO_AUTH  # For local testing only
  prompt: |
    Colony agent job received (now: {now}):

    Job ID: {payload.job_id}
    Action: {payload.action_hint}
    Domain: {payload.domain}
    Risk tier: {payload.risk}
    Description: {payload.description}
    Context: {payload.context}

    This is YOUR job from your own work queue. Execute it with your own
    toolsets, then close the lifecycle yourself:

    IF this is an observation sync (action starts with "agent_sync_"):
    1. Observe the domain using your own connections. Examples:
       - coding:  `gh pr list --json number,title,url,isDraft,reviewDecision,statusCheckRollup`
       - task:    `gh issue list --json number,title,url,assignees,updatedAt`
       - system:  check the services you manage (health endpoints, logs)
       - calendar/research/project: use whatever access you have; skip
         gracefully and fail the job with a clear error if you have none.
    2. Report what you saw (one entity per observation, stable entity_id):
       curl -X POST {payload.observations_url} \
         -H "X-API-Key: $COLONY_API_KEY" -H "Content-Type: application/json" \
         -d '{"domain": "{payload.domain}", "reported_by": "<your-agent-name>", "observations": [{"entity_id": "repo#123", "payload": {"title": "...", "ci_status": "failing", "review_requested": true}}]}'
       Payload fields Colony understands per domain:
       - coding:   title, url, ci_status, review_requested, draft
       - task:     title, url, state, assignee, stale_days, needs_follow_up
       - calendar: title, start_time (ISO), location, attendees, needs_prep
       - research: title, url, status, last_checked (ISO)
       - project:  title, due_on (ISO), open_issues, closed_issues
       - system:   status, latency_ms, error_rate, message
    3. Complete the job:
       curl -X POST {payload.complete_url} \
         -H "X-API-Key: $COLONY_API_KEY" -H "Content-Type: application/json" \
         -d '{"output": {"observed": <count>}}'

    OTHERWISE (a regular registered action): execute it as described,
    then POST the result to {payload.complete_url} the same way. If you
    cannot execute it, POST {payload.fail_url} with {"error": "<why>"}.

    These jobs are routine plumbing: do NOT message the owner about them.
    Full output goes to LOGS only.

  deliver: log
  rate_limit: 10
