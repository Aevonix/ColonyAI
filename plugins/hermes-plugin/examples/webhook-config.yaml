# Example Hermes webhook configuration for Colony autonomy pipeline
# Place this under platforms.webhook.extra.routes in ~/.hermes/config.yaml
#
# Philosophy:
# - Webhook responses go to watcher (log) by default
# - The agent decides which channel to communicate to the user via send_message
# - This is generic — works for WhatsApp, Telegram, Discord, or any platform
#
# v2 — temporal awareness, sync health, and auto-restart

---
colony-initiatives:
  secret: INSECURE_NO_AUTH  # For local testing only
  prompt: |
    Colony {payload.type} received at {payload.occurred_at} (now: {now}):

    {if payload.type == "initiative"}
    Type: {payload.payload.initiative_type}
    Title: {payload.payload.title}
    Description: {payload.payload.description}
    Priority: {payload.payload.priority}
    Suggested actions: {payload.payload.context.suggested_actions}

    You are {payload.agent_name}, an autonomous agent. Act on this initiative immediately.

    DELIVERY RULES (initiative):
    - Your FULL response (detailed reasoning, tool outputs, findings) goes to LOGS only.
    - If you need to notify the user of the outcome, use `send_message` with
      target "{payload.delivery_context.log_channel}".
    - Send AT MOST ONE message to the user per initiative. Make it concise
      — one or two sentences max.
    - Do NOT send multiple follow-up messages. Do NOT send "still working" updates.
    - If the initiative requires user input or is blocked, send ONE message
      asking what they want to do.
    - If you can complete the initiative autonomously, send ONE message
      summarizing what you did.
    {endif}

    {if payload.type == "alert"}
    Alert Type: {payload.payload.alert_type}
    Severity: {payload.payload.severity}
    Last Seen: {payload.payload.last_seen_at}
    Suggested Action: {payload.payload.suggested_action}

    DELIVERY RULES (alert):
    - Route this alert to the LOG CHANNEL ONLY.
    - NEVER send a DM to the user for alerts regardless of severity.
    - Use `send_message` with target "{payload.delivery_context.log_channel}".
    - Provide a concise summary of the alert and the suggested action.
    {endif}

    TEMPORAL AWARENESS:
    - The current time is {now}. Always prefer this over any timestamps from Colony data.
    - Colony stores event times; the host provides the reference frame.
    - If data appears stale, say so — do not fabricate a narrative to make it seem current.

  deliver: log

  # Rate limit: max 5 initiatives per minute
  rate_limit: 5
